name: CI/CD + DevSecOps

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Code & Dependency Scan (blocks critical vulns)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical --fail-on=upgradable

      - name: Build Docker image for scanning
        run: docker build -t devops-showcase:${{ github.sha }} .

      - name: Trivy vulnerability scan (blocks critical)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'devops-showcase:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  build-and-deploy:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-showcase:latest,${{ secrets.DOCKER_USERNAME }}/devops-showcase:${{ github.sha }}

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-showcase:latest
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d --name devops-app --restart always -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/devops-showcase:latest
            echo "Deployment successful! App running at http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)"